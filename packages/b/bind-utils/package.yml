# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
# Make sure to update the Anitya ID if changing this from the 9.20.x LTS series
name       : bind-utils
version    : 9.20.21
release    : 39
source     :
    - https://downloads.isc.org/isc/bind9/9.20.21/bind-9.20.21.tar.xz : 15e1b5a227d2890f7c4e823a6ea018de70ee2f3a0e859cbff3d82aad8590de03
homepage   : https://www.isc.org/bind/
license    : MPL-2.0
component  : network.util
summary    : Client side programs nslookup, dig and host.
networking : true
description: |
    BIND (Berkeley Internet Name Domain) is a complete, highly portable implementation of the Domain Name System (DNS) protocol.
libsplit   : false
builddeps  :
    - pkgconfig(json-c)
    - pkgconfig(krb5)
    - pkgconfig(libedit)
    - pkgconfig(libidn2)
    - pkgconfig(libmaxminddb)
    - pkgconfig(libnghttp2)
    - pkgconfig(liburcu)
    - pkgconfig(libuv)
    - python-sphinx
setup      : |
    %reconfigure \
        --disable-static \
        --with-readline=libedit \
        --with-json-c \
        --with-libidn2 \
        --with-libxml2 \
        --with-zlib
build      : |
    %make -C lib
    %make bind.keys.h
    %make -C bin/delv
    %make -C bin/dig
    %make -C bin/nsupdate
    %make -C doc/man
install    : |
    %make_install -C lib
    %make_install -C bin/delv
    %make_install -C bin/dig
    %make_install -C bin/nsupdate
    %install_license COPYING COPYRIGHT LICENSE

    rm -rfv $installdir/usr/include

    install -dm00755 $installdir/usr/share/man/man1
    install -Dm00644 doc/man/delv.1 doc/man/dig.1 doc/man/host.1 doc/man/nslookup.1 doc/man/nsupdate.1 -t $installdir/usr/share/man/man1
