# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : hyprlock
version    : 0.9.3
release    : 22
source     :
    - https://github.com/hyprwm/hyprlock/archive/refs/tags/v0.9.3.tar.gz : 22e7346486d0f6a1ab46d9917ae5354de4d3d32350f6947bc7028a9c42859ce8
homepage   : https://github.com/hyprwm/hyprlock
license    : BSD-3-Clause
component  : desktop.hyprland
summary    : Hyprland's simple, yet multi-threaded and GPU-accelerated screen locking utility.
description: |
    Hyprland's simple, yet multi-threaded and GPU-accelerated screen locking utility.
builddeps  :
    - pkgconfig(cairo) # not in used libs, but cmake insists
    - pkgconfig(gbm)
    - pkgconfig(gdk-pixbuf-2.0)
    - pkgconfig(hyprgraphics)
    - pkgconfig(hyprlang)
    - pkgconfig(hyprutils)
    - pkgconfig(hyprwayland-scanner)
    - pkgconfig(libdrm)
    - pkgconfig(libjpeg)
    - pkgconfig(libwebp)
    - pkgconfig(opengl)
    - pkgconfig(pam)
    - pkgconfig(pangocairo) # not in used libs, but cmake insists
    - pkgconfig(sdbus-c++)
    - pkgconfig(wayland-client)
    - pkgconfig(wayland-egl)
    - pkgconfig(wayland-eglstream)
    - pkgconfig(wayland-eglstream-protocols)
    - pkgconfig(wayland-protocols)
    - pkgconfig(xkbcommon)
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE

    # Stateless
    install -dm00755 $installdir/usr/share/defaults/etc/pam.d
    mv $installdir/etc/pam.d/hyprlock $installdir/usr/share/defaults/etc/pam.d
    rmdir -v $installdir/etc/pam.d \
             $installdir/etc
