# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : htop
version    : 3.5.0
release    : 27
source     :
    - https://github.com/htop-dev/htop/releases/download/3.5.0/htop-3.5.0.tar.xz : b6586e405c5223ebe5ac7828df21edad45cbf90288088bd1b18ad8fa700ffa05
homepage   : https://htop.dev
license    : GPL-2.0-or-later
component  : system.utils
summary    : htop (interactive process viewer for Linux)
description: |
    htop is an interactive process viewer for Linux.
builddeps  :
    - lm_sensors-devel
rundeps    :
    - lm_sensors
setup      : |
    %reconfigure
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING
    install -Dm00644 $pkgfiles/htop.metainfo.xml -t $installdir/usr/share/metainfo
