# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kholidays
version    : 6.25.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.25/kholidays-6.25.0.tar.xz : 13c345422f802bd157aaea18b2ccb5270eb5e3de44915bcce70f1a4234e1497b
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-2-Clause
    - CC0-1.0
    - GPL-3.0-or-later
    - LGPL-2.0-or-later
component  : desktop.library
summary    : KDE library for regional holiday information
description: |
    KDE library for regional holiday information
