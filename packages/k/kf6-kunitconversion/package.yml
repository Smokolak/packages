# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kunitconversion
version    : 6.25.0
release    : 31
source     :
    - https://download.kde.org/stable/frameworks/6.25/kunitconversion-6.25.0.tar.xz : 369ef042de797ea647994c524cc43915b514850026cfddb4b24bc78bdfc3dcc8
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-or-later
component  : desktop.library
summary    : Converting physical units
description: |
    KUnitConversion provides functions to convert values in different physical units. It supports converting different prefixes (e.g. kilo, mega, giga) as well as converting between different unit systems (e.g. liters, gallons).
builddeps  :
    - kf6-ki18n-devel
rundeps    :
    - devel :
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6 -DBUILD_PYTHON_BINDINGS=OFF
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
