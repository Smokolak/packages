# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kcompletion
version    : 6.25.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.25/kcompletion-6.25.0.tar.xz : e4138d525eb9e27a9222d655e412c0de8b4bd7b34289d1c7ca5a808e20b53238
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
component  : programming.library
