    - https://download.kde.org/stable/frameworks/6.25/kauth-6.25.0.tar.xz : e1a9b20a1b8718a0a0ead943e6ae999692fe7efe6b5bd513fdb5ba1849e4bdf0
homepage   : https://community.kde.org/Frameworks
