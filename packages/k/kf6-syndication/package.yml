# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-syndication
version    : 6.25.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.25/syndication-6.25.0.tar.xz : 953f5935b1a0ba7c2c70cc213c0144d9c73855c802a1525be6c086543428f957
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-2-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : programming.library
summary    : An RSS/Atom parser library
description: |
    syndication is a parser library for RSS and Atom feeds. syndication offers a unified, format-agnostic view on the parsed feed, so that the using application does not need to distinguish between feed formats.
builddeps  :
    - kf6-kcodecs-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
