# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kservice
version    : 6.25.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.25/kservice-6.25.0.tar.xz : 04fa9f824e50c25b6ad7e29262c6566e0ce11edefb9fede317399a88501e9f74
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : programming.library
summary    : Plugin framework for desktop services.
description: |
    Plugin framework for desktop services.
