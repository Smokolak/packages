# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kcodecs
version    : 6.25.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.25/kcodecs-6.25.0.tar.xz : 5051fe783803d94444a231c79635b96f1266594942b836f59ae8460497c788c5
homepage   : https://community.kde.org/Frameworks
license    :
    - Apache-2.0
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
    - MIT
    - MPL-1.1
component  : programming.library
summary    : String encoding library.
description: |
    String encoding library.
builddeps  :
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
    - gperf
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
