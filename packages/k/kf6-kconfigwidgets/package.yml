# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kconfigwidgets
version    : 6.25.0
release    : 36
source     :
    - https://download.kde.org/stable/frameworks/6.25/kconfigwidgets-6.25.0.tar.xz : c45ee1f4b2ede987efc8deac48710d87d9d37bb8355f0d7e130d557dfb2029a2
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
    - MIT
component  : desktop.library
summary    : Widgets for configuration dialogs
description: |
    Widgets for configuration dialogs
builddeps  :
    - pkgconfig(KF6GuiAddons)
    - extra-cmake-modules
    - kf6-kcodecs-devel
    - kf6-kcolorscheme-devel
    - kf6-kconfig-devel
    - kf6-kcoreaddons-devel
    - kf6-ki18n-devel
    - kf6-kwidgetsaddons-devel
    - qt6-base-private-devel
rundeps    :
    - devel :
        - kf6-kcodecs-devel
        - kf6-kcolorscheme-devel
        - kf6-kconfig-devel
        - kf6-kcoreaddons-devel
        - kf6-kguiaddons-devel
        - kf6-ki18n-devel
        - kf6-kwidgetsaddons-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
