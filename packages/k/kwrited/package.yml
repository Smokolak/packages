# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kwrited
version    : 6.6.4
release    : 134
source     :
    - https://download.kde.org/stable/plasma/6.6.4/kwrited-6.6.4.tar.xz : 22543f56e124e76c96666e162b70d88d9dfdaf4000e732fca3ffc34a2ed36196
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - CC0-1.0
    - GPL-2.0-or-later
component  : desktop.kde.core
summary    : KDE daemon listening for wall and write messages
description: |
    KDE daemon listening for wall and write messages.
builddeps  :
    - kf6-kcoreaddons-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
    - kf6-kpty-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
