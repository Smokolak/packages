# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-modemmanager-qt
version    : 6.25.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.25/modemmanager-qt-6.25.0.tar.xz : 1f1c3ef493445a3f9215462dd86d25e2e4355ffbce9a70016288be04c537b91b
homepage   : https://community.kde.org/Frameworks
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : Qt wrapper for ModemManager DBus API
description: |
    ModemManagerQt provides access to all ModemManager features exposed on DBus. It allows you to manage modem devices and access to information available for your modem devices, like signal, location and messages.
builddeps  :
    - pkgconfig(ModemManager)
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
rundeps    :
    - devel :
        - modem-manager-devel
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
