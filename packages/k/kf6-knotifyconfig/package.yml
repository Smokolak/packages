# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-knotifyconfig
version    : 6.25.0
release    : 31
source     :
    - https://download.kde.org/stable/frameworks/6.25/knotifyconfig-6.25.0.tar.xz : 8dc37406d8f13193216201752ece968cbd38da5a76780ad78575d11b47b440ea
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-only
component  : desktop.library
summary    : Configuration dialog for desktop notifications.
description: |
    Configuration dialog for desktop notifications.
builddeps  :
