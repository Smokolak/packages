# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-purpose
version    : 6.25.0
release    : 38
source     :
    - https://download.kde.org/stable/frameworks/6.25/purpose-6.25.0.tar.xz : 773abfa91f50ce10419373fdb4e7e0b2be009e739f8de2f3450d3ef169b6a23e
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-or-later
component  : desktop.library
summary    : Framework for providing abstractions to get the developer's purposes fulfilled.
description: |
    This framework offers the possibility to create integrate services and actions on any application without having to implement them specifically. Purpose will offer them mechanisms to list the different alternatives to execute given the requested action type and will facilitate components so that all the plugins can receive all the information they need.
builddeps  :
    - pkgconfig(Qt6Qml)
    - pkgconfig(accounts-qt6)
    - accounts-qml-module
    - kaccounts-integration-devel
    - kf6-kdeclarative-devel
    - kf6-kio-devel
    - kf6-kirigami-devel
    - kf6-kitemmodels-devel
    - kf6-knotifications-devel
    - kf6-prison-devel
    - qt6-base-private-devel
rundeps    :
    - accounts-qml-module
    - devel :
        - kf6-kcoreaddons-devel
    - kf6-kdeclarative
    - kf6-prison
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
