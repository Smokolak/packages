# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kplotting
version    : 6.25.0
release    : 31
source     :
    - https://download.kde.org/stable/frameworks/6.25/kplotting-6.25.0.tar.xz : 9fbd4775c9b1f56a24d90ee47cd0ad57c816fbbf60e3aaeba6e2b631f7b3fc9b
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
component  : desktop.library
summary    : Data plotting
description: |
    KPlotting provides KPlotWidget, a QWidget-derived class that provides a virtual base class for easy data-plotting. The idea behind KPlotWidget is that you only have to specify information in "data units"; i.e., the natural units of the data being plotted. KPlotWidget automatically converts everything to screen pixel units.
builddeps  :
    - pkgconfig(Qt6Designer)
    - extra-cmake-modules
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-base-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
