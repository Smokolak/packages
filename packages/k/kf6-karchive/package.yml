# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-karchive
version    : 6.25.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.25/karchive-6.25.0.tar.xz : 123a268352ab63d548ba5e3c3e8fbf1d737025e4c5189821cf10e3328ab4de15
homepage   : https://community.kde.org/Frameworks
license    :
    - Apache-2.0
    - BSD-2-Clause
    - CC0-1.0
    - LGPL-2.0-or-later
component  : programming.library
summary    : Reading, creating, and manipulating file archives.
description: |
    Reading, creating, and manipulating file archives.
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(bzip2)
    - extra-cmake-modules
rundeps    :
    - devel :
        - extra-cmake-modules
        - qt6-tools-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
