# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kitemmodels
version    : 6.25.0
release    : 34
source     :
    - https://download.kde.org/stable/frameworks/6.25/kitemmodels-6.25.0.tar.xz : ab78119a00b84eac65ffc986df30fbf9b1b8d00635e8fc626372e84580d158ca
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-2.1-or-later
component  : desktop.library
