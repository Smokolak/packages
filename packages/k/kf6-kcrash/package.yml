# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : kf6-kcrash
version    : 6.25.0
release    : 32
source     :
    - https://download.kde.org/stable/frameworks/6.25/kcrash-6.25.0.tar.xz : b1b952c500787e760c0fca3ce20c6ed8cf488ed106e0e72bc604509df84d8fd7
homepage   : https://community.kde.org/Frameworks
license    :
    - CC0-1.0
    - LGPL-2.0-or-later
component  : desktop.library
summary    : Graceful handling of application crashes.
description: |
    Graceful handling of application crashes.
builddeps  :
    - pkgconfig(x11)
    - kf6-kcoreaddons-devel
rundeps    :
    - devel :
        - kf6-kcoreaddons-devel
clang      : true
optimize   : thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
