# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : orca
version    : '49.6'
release    : 40
source     :
    - https://download.gnome.org/sources/orca/49/orca-49.6.tar.xz : 0e1792b3da8dac8e6c66cbc927e9735a1cd1537e62abadefdcd14c99bf8b461f
homepage   : https://gitlab.gnome.org/GNOME/orca
license    : LGPL-2.1-or-later
component  : desktop.gnome
summary    : Orca Screen Reader
description: |
    Orca is a free, open source, flexible, and extensible screen reader that provides access to the graphical desktop via user-customizable combinations of speech and/or braille.
builddeps  :
    - pkgconfig(gstreamer-1.0)
    - pkgconfig(libwnck-3.0)
    - pkgconfig(pygobject-3.0)
    - pkgconfig(python3)
    - pkgconfig(speech-dispatcher)
    - itstool
    - python-dasbus
    - yelp-tools
rundeps    :
    - pyatspi2
    - python-dasbus
    - speech-dispatcher
setup      : |
    %meson_configure
build      : |
    %ninja_build
install    : |
    %ninja_install
    # Stateless XDG
    mv $installdir/etc/xdg $installdir/usr/share/.
    rmdir $installdir/etc
