# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : openexr
version    : 3.4.10
release    : 13
source     :
    - https://github.com/AcademySoftwareFoundation/openexr/archive/refs/tags/v3.4.10.tar.gz : b61ae2d0fa4872c5f5fc45618f107945df37c0eba4853263091b949c513d3319
homepage   : https://www.openexr.com/
license    : BSD-3-Clause
component  :
    - multimedia.library
    - libs : multimedia.library
    - examples : programming.library
summary    :
    - A high dynamic-range image file format library
    - libs : Shared libraries for OpenEXR
    - examples : OpenEXR code examples
description: |
    OpenEXR provides the specification and reference implementation of the EXR file format, the professional-grade image storage format of the motion picture industry.

    The purpose of EXR format is to accurately and efficiently represent high-dynamic-range scene-linear image data and associated metadata, with strong support for multi-part, multi-channel use cases.

    OpenEXR is widely used in host application software where accuracy is critical, such as photorealistic rendering, texture access, image compositing, deep compositing, and DI.
builddeps  :
    - pkgconfig(Imath)
rundeps    :
    - devel :
        - openexr-libs
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE*
check      : |
    %ninja_check
patterns   :
    - libs :
        - /usr/lib64/lib*.so.*
    - examples :
        - /usr/share/doc/OpenEXR/examples/
