# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : gleam
version    : 1.15.2
release    : 13
source     :
    - https://github.com/gleam-lang/gleam/archive/refs/tags/v1.15.2.tar.gz : 6fe365a52660d854a73d56e0752fc9ff47fdaa19b0ddc9edbcaa1fb935685eca
homepage   : https://gleam.run
license    : Apache-2.0
component  : programming
summary    : A friendly language for building type-safe systems that scale.
description: |
    Gleam is a friendly language for building type-safe systems that scale.
    The power of a type system, the expressiveness of functional programming, and the reliability of the highly concurrent, fault tolerant Erlang runtime, with a familiar and modern syntax.
    Gleam comes with compiler, build tool, formatter, editor integrations, and package manager all built in.
    As part of the wider BEAM ecosystem, Gleam programs can use thousands of published packages, whether they are written in Gleam, Erlang, or Elixir.
    Gleam can additionally compile to JavaScript, enabling you to use your code in the browser, or anywhere else JavaScript can run.
networking : true
builddeps  :
    - rust
rundeps    :
    - rebar3
setup      : |
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    %cargo_install
    %install_license LICENCE
