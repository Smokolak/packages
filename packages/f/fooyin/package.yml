# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : fooyin
version    : 0.10.3
release    : 20
source     :
    - https://github.com/fooyin/fooyin/archive/refs/tags/v0.10.3.tar.gz : 3ba96386c12acacb7b73a637bf2a57690516814e862868e340505a3804551cda
homepage   : https://www.fooyin.org/
license    : GPL-3.0-or-later
component  : multimedia.audio
summary    : fooyin is a music player built around customisation.
description: |
    fooyin is a music player built around customisation.
clang      : true
builddeps  :
    - pkgconfig(Qt6Designer)
    - pkgconfig(Qt6Platform)
    - pkgconfig(Qt6SvgWidgets)
    - pkgconfig(alsa)
    - pkgconfig(icu-i18n)
    - pkgconfig(libavfilter)
    - pkgconfig(libspa-0.2)
    - pkgconfig(sdl2)
    - pkgconfig(sndfile)
    - pkgconfig(taglib)
    - kdsingleapplication-devel
    - qcoro-qt6-devel
setup      : |
    %cmake_ninja
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license COPYING
