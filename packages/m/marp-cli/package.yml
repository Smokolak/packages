# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : marp-cli
version    : 4.3.1
release    : 19
homepage   : https://marp.app/
source     :
    - https://github.com/marp-team/marp-cli/archive/refs/tags/v4.3.1.tar.gz : 691e671a7a6956a9fd4161a51463438efe3dadb85aaea04568a1f7e8ac66af46
license    : MIT
component  : office
summary    : A CLI interface for Marp and Marpit based converters
description: |
    A CLI interface for Marp and any slide deck converter based on Marpit framework. It can convert Marp / Marpit Markdown files into static HTML / CSS, PDF, PowerPoint document, and image(s) easily.
networking : true
strip      : false
debug      : false
builddeps  :
    - git
    - nodejs
    - yarn
setup      : |
    yarn install
build      : |
    yarn build
    yarn run pkg . \
        --out-path ./bin \
        --targets host \
        --compress Brotli
install    : |
    install -Dm0755 bin/marp-cli $installdir/usr/bin/marp
    %install_license LICENSE
