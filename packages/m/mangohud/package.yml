# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : mangohud
version    : 0.8.2
release    : 29
source     :
    - https://github.com/flightlessmango/MangoHud/releases/download/v0.8.2/MangoHud-v0.8.2-Source.tar.xz : 9fe98da24f790f4489efc1e0c8e3ad0291c80efd882a406797d54dab82f8765b
license    : MIT
component  : system.utils
homepage   : https://github.com/flightlessmango/MangoHud
summary    : Vulkan overlay layer for monitoring FPS, temperatures, CPU/GPU load and more
description: |
    A modification of the Mesa Vulkan overlay. Including GUI improvements, temperature reporting, and logging capabilities.
emul32     : true
libsplit   : false
patterns   :
    - /*
builddeps  :
    - pkgconfig32(libdrm)
    - pkgconfig32(vulkan)
    - pkgconfig32(wayland-client)
    - pkgconfig32(x11)
    - pkgconfig32(xkbcommon)
    - pkgconfig(glfw3)
    - pkgconfig(spdlog)
    - glslang-devel
    - mako
    - mesalib-devel
    - vulkan-headers
setup      : |
    if [[ ! -z "${EMUL32BUILD}" ]]; then
        build_mangoapp="false"
        system_spdlog="disabled"
    else
        build_mangoapp="true"
        system_spdlog="enabled"
    fi

    %meson_configure -Dmangoapp=$build_mangoapp \
                     -Dinclude_doc=true \
                     -Dwith_xnvctrl=disabled \
                     -Duse_system_spdlog=$system_spdlog
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSE
    install -Dm00644 $workdir/data/MangoHud.conf -t $installdir/usr/share/mangohud
