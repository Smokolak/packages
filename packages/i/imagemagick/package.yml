# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : imagemagick
version    : 7.1.2.18
release    : 211
source     :
    - https://github.com/ImageMagick/ImageMagick/archive/refs/tags/7.1.2-18.tar.gz : 2db8a1f9bac19831c76574e4fd514ecb80a71a49911ee5dc8c1f3fb6d9d550df
homepage   : https://imagemagick.org/
license    : Apache-2.0
component  : multimedia.graphics
summary    : ImageMagick® suite to create, edit, compose, or convert bitmap images
description: |
    ImageMagick® is a software suite to create, edit, compose, or convert bitmap images. It can read and write images in a variety of formats (over 200) including PNG, JPEG, JPEG-2000, GIF, TIFF, DPX, EXR, WebP, Postscript, PDF, and SVG. Use ImageMagick to resize, flip, mirror, rotate, distort, shear and transform images, adjust image colors, apply various special effects, or draw text, lines, polygons, ellipses and Bézier curves.
builddeps  :
    - pkgconfig(OpenEXR)
    - pkgconfig(bzip2)
    - pkgconfig(ddjvuapi)
    - pkgconfig(fftw3)
    - pkgconfig(lcms2)
    - pkgconfig(libgvc)
    - pkgconfig(libheif)
    - pkgconfig(libjxl)
    - pkgconfig(liblzma)
    - pkgconfig(libopenjp2)
    - pkgconfig(libraw)
    - pkgconfig(librsvg-2.0)
    - pkgconfig(libtiff-4)
    - pkgconfig(libturbojpeg)
    - pkgconfig(libwebp)
    - pkgconfig(libxml-2.0)
    - pkgconfig(libzstd)
    - pkgconfig(pangocairo)
    - pkgconfig(raqm)
    - ghostscript-devel
setup      : |
    %patch -p1 -i $pkgfiles/Stateless.patch
    %configure --disable-static \
               --enable-shared \
               --with-fftw \
               --with-gslib \
               --with-jxl \
               --with-openjp2 \
               --with-perl \
               --with-perl-options='INSTALLDIRS=vendor INSTALL_BASE=' \
               --with-rsvg
build      : |
    %make
install    : |
    %make_install
    %install_license LICENSE
    install -dm00755 $installdir/usr/share/defaults
    mv $installdir/etc/ImageMagick-7 $installdir/usr/share/defaults
    rm -rvf "$installdir/%perl_privlib%"
    rmdir $installdir/etc
patterns   :
    - docs :
        - /usr/share/doc
