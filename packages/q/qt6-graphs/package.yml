# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qt6-graphs
version    : 6.10.3
release    : 1
source     :
    - https://download.qt.io/official_releases/qt/6.10/6.10.3/submodules/qtgraphs-everywhere-src-6.10.3.tar.xz : 8c573486d1dda961eae10d464d4a592a3b0e9a7ed8bbb8467abe2af8df00916a
license    :
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
component  :
    - desktop.qt
homepage   : https://www.qt.io
summary    : Qt6 Graphs Module
description: |
    The Qt Graphs module enables you to visualize data in 2D and 3D graphs. Qt Graphs is built on Qt 6 and the 3D graphs on Qt Quick 3D to take advantage of hardware acceleration and Qt Quick.
builddeps  :
    - pkgconfig(Qt63DCore)
    - pkgconfig(Qt6Core)
    - pkgconfig(Qt6Quick)
    - pkgconfig(Qt6Quick3D)
    - pkgconfig(Qt6ShaderTools)
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja \
                 -DCMAKE_MESSAGE_LOG_LEVEL=STATUS
build      : |
    %ninja_build
install    : |
    %ninja_install

    %install_license LICENSES/*
