# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qt6-translations
version    : 6.10.3
release    : 20
source     :
    - https://download.qt.io/official_releases/qt/6.10/6.10.3/submodules/qttranslations-everywhere-src-6.10.3.tar.xz : 52689984b114d4d34516d5d7bfb0c75857b1c3ff529921042144f09ab2de3a83
license    :
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
component  : desktop.qt
homepage   : https://www.qt.io
summary    : Qt6 Translation Components
description: |
    Translations Module for Qt6
builddeps  :
    - pkgconfig(Qt6UiTools)
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja \
                 -DCMAKE_MESSAGE_LOG_LEVEL=STATUS
build      : |
    %ninja_build
install    : |
    %ninja_install
