# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qt6-positioning
version    : 6.10.3
release    : 19
source     :
    - https://download.qt.io/official_releases/qt/6.10/6.10.3/submodules/qtpositioning-everywhere-src-6.10.3.tar.xz : 64cf6c5d1137378ec6a276d3f6e5be7b9d299436d66cea36ebd31035314287a2
license    :
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
component  :
    - desktop.qt
    - demos : programming.library
homepage   : https://www.qt.io
summary    : Qt6 position, satellite and area monitoring classes
description: |
    Provides access to position, satellite and area monitoring classes
builddeps  :
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6SerialPort)
    - pkgconfig(Qt6Svg)
    - pkgconfig(gconf-2.0)
    - qt6-base-private-devel
rundeps    :
    - devel :
        - gconf-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja \
                 -DCMAKE_MESSAGE_LOG_LEVEL=STATUS
build      : |
    %ninja_build
install    : |
    %ninja_install
patterns   :
    - devel :
        - /usr/bin
        - /usr/lib64/qt6/bin
    - demos :
        - /usr/lib64/qt6/examples
