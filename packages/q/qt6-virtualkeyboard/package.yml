# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qt6-virtualkeyboard
version    : 6.10.3
release    : 20
source     :
    - https://download.qt.io/official_releases/qt/6.10/6.10.3/submodules/qtvirtualkeyboard-everywhere-src-6.10.3.tar.xz : 3298e26dfa4fad2363e3dfb2b55079c54fc8115a4a040d9616e5619f095d8fb5
license    :
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
component  :
    - desktop.qt
    - demos : programming.library
homepage   : https://www.qt.io
summary    : Qt Virtual Keyboard
description: |
    Qt Virtual Keyboard is a virtual keyboard framework that consists of a C++ backend supporting custom input methods as well as a UI frontend implemented in QML.
builddeps  :
    - pkgconfig(Qt6Multimedia)
    - pkgconfig(Qt6Qml)
    - pkgconfig(Qt6Svg)
    - pkgconfig(hunspell)
    - qt6-base-private-devel
rundeps    :
    - devel :
        - libhunspell-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja \
                 -DCMAKE_MESSAGE_LOG_LEVEL=STATUS
build      : |
    %ninja_build
install    : |
    %ninja_install
patterns   :
    - demos :
        - /usr/lib64/qt6/examples
