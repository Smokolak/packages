# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : qt6-serialbus
version    : 6.10.3
release    : 18
source     :
    - https://download.qt.io/official_releases/qt/6.10/6.10.3/submodules/qtserialbus-everywhere-src-6.10.3.tar.xz : 02d9612254085f2f0e8514edf75199aa24f0a1dc5f1a93e41361150ad822e1e7
license    :
    - GFDL-1.3-or-later
    - GPL-3.0-or-later
    - LGPL-3.0-or-later
component  :
    - desktop.qt
    - demos : programming.library
homepage   : https://www.qt.io
summary    : Qt module for general purpose serial bus access
description: |
    Qt module for general purpose serial bus access
builddeps  :
    - pkgconfig(Qt6SerialPort)
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_ninja \
                 -DCMAKE_MESSAGE_LOG_LEVEL=STATUS
build      : |
    %ninja_build
install    : |
    %ninja_install
patterns   :
    - demos :
        - /usr/lib64/qt6/examples
