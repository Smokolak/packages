# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-thunderbolt
version    : 6.6.4
release    : 97
source     :
    - https://download.kde.org/stable/plasma/6.6.4/plasma-thunderbolt-6.6.4.tar.xz : 0d0495820d5dc97f9ca622fb44b7a1c1ab555edd37cd5e6e8aaf44a59fe8c8f5
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
component  : desktop.kde.core
summary    : Plasma integration for controlling Thunderbolt devices
description: |-
    Plasma integration for controlling Thunderbolt devices
libsplit   : false
builddeps  :
    - bolt
    - kf6-kcmutils-devel
    - kf6-kconfigwidgets-devel
    - kf6-kcoreaddons-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
rundeps    :
    - bolt
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
