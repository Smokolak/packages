# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-thunderbolt
version    : 6.6.3
release    : 96
source     :
    - https://download.kde.org/stable/plasma/6.6.3/plasma-thunderbolt-6.6.3.tar.xz : 93849d95036f18d83d118320098c6a3de3444cfde1bbfe45b2dd076c01bae502
homepage   : https://www.kde.org/workspaces/plasmadesktop/
license    :
    - BSD-3-Clause
    - CC0-1.0
    - GPL-2.0-only
    - GPL-3.0-only
component  : desktop.kde.core
summary    : Plasma integration for controlling Thunderbolt devices
description: |-
    Plasma integration for controlling Thunderbolt devices
libsplit   : false
builddeps  :
    - bolt
    - kf6-kcmutils-devel
    - kf6-kconfigwidgets-devel
    - kf6-kcoreaddons-devel
    - kf6-kdbusaddons-devel
    - kf6-ki18n-devel
    - kf6-knotifications-devel
rundeps    :
    - bolt
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
