# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-activities-stats
version    : 6.6.3
release    : 45
source     :
    - https://download.kde.org/stable/plasma/6.6.3/plasma-activities-stats-6.6.3.tar.xz : 56667b230dc52893c3f08680e37a403d228a50a6a0b06ad081179224a7f16d16
homepage   : https://invent.kde.org/plasma/plasma-activities-stats
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
summary    : A library for accessing the usage data collected by the activities system.
description: |
    A library for accessing the usage data collected by the activities system.
builddeps  :
    - pkgconfig(Qt6Core)
    - kf6-kconfig-devel
    - plasma-activities-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
