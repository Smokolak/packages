# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : plasma-activities-stats
version    : 6.6.4
release    : 46
source     :
    - https://download.kde.org/stable/plasma/6.6.4/plasma-activities-stats-6.6.4.tar.xz : 8b1a6a93afee6876d5050d874927912f32e52c60ff3c67bcded477f4f7c9cd45
homepage   : https://invent.kde.org/plasma/plasma-activities-stats
license    :
    - CC0-1.0
    - GPL-2.0-only
    - GPL-2.0-or-later
    - GPL-3.0-only
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.library
