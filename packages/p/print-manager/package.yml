# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : print-manager
version    : 6.6.3
release    : 124
source     :
    - https://download.kde.org/stable/plasma/6.6.3/print-manager-6.6.3.tar.xz : 686fcff428c2be57114d14c3e74129f3e35e4c457cbcad37219515473c5b621b
homepage   : https://kde.org/
license    :
    - BSD-3-Clause
    - GPL-2.0-or-later
    - LGPL-2.0-or-later
    - LGPL-2.1-only
    - LGPL-3.0-only
component  : desktop.kde.core
summary    : Tool for managing print jobs and printers
description: |
    Tool for managing print jobs and printers on the KDE Plasma desktop.
libsplit   : false
builddeps  :
    - pkgconfig(Qt6Qml)
    - pkgconfig(cups)
    - kf6-kcmutils-devel
    - kf6-kdbusaddons-devel
    - kf6-kio-devel
    - kf6-kirigami-devel
    - kf6-knotifications-devel
    - libplasma-devel
    - qt6-base-private-devel
clang      : true
optimize   :
    - speed
    - thin-lto
setup      : |
    %cmake_kf6
build      : |
    %ninja_build
install    : |
    %ninja_install
    %install_license LICENSES/*
