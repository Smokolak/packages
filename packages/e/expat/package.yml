# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : expat
version    : 2.8.0
release    : 38
source     :
    - https://github.com/libexpat/libexpat/releases/download/R_2_8_0/expat-2.8.0.tar.bz2 : 586494499ac3ad46d87f3beda7b1f770c1c8026a9b60e151593f8b29089a52ca
homepage   : https://libexpat.github.io/
license    : MIT
component  :
    - system.base
    - devel : system.devel
summary    : XML Parsing Library
description: |
    The Expat package contains a stream oriented C library for parsing XML.
emul32     : true
setup      : |
    %configure --disable-static
build      : |
    %make
profile    : |
    %make check
install    : |
    %make_install
    %install_license COPYING
check      : |
    %make check
