# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : expat
version    : 2.7.5
release    : 37
source     :
    - https://github.com/libexpat/libexpat/releases/download/R_2_7_5/expat-2.7.5.tar.bz2 : 386a423d40580f1e392e8b512b7635cac5083fe0631961e74e036b0a7a830d77
homepage   : https://libexpat.github.io/
license    : MIT
component  :
    - system.base
    - devel : system.devel
summary    : XML Parsing Library
description: |
    The Expat package contains a stream oriented C library for parsing XML.
emul32     : true
setup      : |
    %configure --disable-static
build      : |
    %make
profile    : |
    %make check
install    : |
    %make_install
    %install_license COPYING
check      : |
    %make check
