# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : typos
version    : 1.45.1
release    : 4
source     :
    - https://github.com/crate-ci/typos/archive/refs/tags/v1.45.1.tar.gz : 0def3b2c9398257bc26818b008eabf4ab1aaf49fb3383abb25c46fc0aeb1ee10
license    :
    - Apache-2.0
    - MIT
component  : programming.tools
homepage   : https://github.com/crate-ci/typos
summary    : Source code spell checker
description: |
    Source code spell checker
builddeps  :
    - rust
checkdeps  :
    - rust-devel # Needs rustfmt
networking : true
setup      : |
    %cargo_fetch
build      : |
    %cargo_build
install    : |
    %cargo_install
    %install_license LICENSE-APACHE
    %install_license LICENSE-MIT
check      : |
    %cargo_test
