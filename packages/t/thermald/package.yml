# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : thermald
version    : 2.15.10
release    : 21
source     :
    - https://github.com/intel/thermal_daemon/archive/refs/tags/v2.15.10.tar.gz : 91f0eb6a471637cd16877be59947048c90912ea80495f78f8c2d4f465f12d6a0
license    : GPL-2.0-or-later
homepage   : https://github.com/intel/thermal_daemon
component  : system.utils
summary    : Thermal daemon for IA
description: |
    Thermal daemon for IA
builddeps  :
    - pkgconfig(libevdev)
    - pkgconfig(libxml-2.0)
    - pkgconfig(upower-glib)
    - autoconf-archive
    - gtk-doc
setup      : |
    %autogen \
        --with-dbus-sys-dir=/usr/share/dbus-1/system.d/ \
        --with-systemdsystemunitdir=%libdir%/systemd/system/
build      : |
    %make
install    : |
    %make_install
    %install_license COPYING

    install -Dm00644 -t ${installdir}/%libdir%/systemd/system-preset/ ${pkgfiles}/20-thermald.preset

    ln -sv thermald.service $installdir/%libdir%/systemd/system/dbus-org.freedesktop.thermald.service
