# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : tetro-tui
version    : 3.2.2
release    : 2
source     :
    - https://github.com/Strophox/tetro-tui/archive/refs/tags/v3.2.2.tar.gz : 36dd2e99ba493181790c3ac2088be808e2b931bd1fda64ef04f35077d2417b98
homepage   : https://github.com/Strophox/tetro-tui
license    : MIT
component  : games.puzzle
summary    : Cross-platform terminal tetromino game
description: |
    A cross-platform terminal game where tetrominos fall and stack. Features multiple
    game modes (Swift, Classic, Master, Puzzle, and more), customizable graphics and
    keybinds, scoreboards, replays, and statistics.
networking : true
builddeps  :
    - rust
setup      : |
    %cargo_fetch
build      : |
    %cargo_build --all-features
install    : |
    %cargo_install
    %install_license LICENSE
check      : |
    %cargo_test
replaces   :
    - tetrs
    - dbginfo :
        - tetrs-dbginfo
