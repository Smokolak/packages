# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : tailscale
version    : 1.96.2
release    : 53
source     :
    - https://github.com/tailscale/tailscale/archive/refs/tags/v1.96.2.tar.gz : 2142b73a86de1e934e20a8f316c8139e234b3360bb76edda4cf5b6cef1e605f3
homepage   : https://tailscale.com
license    : BSD-3-Clause
component  : network.clients
summary    : Private WireGuard® networks made easy
description: |
    The easiest, most secure way to use WireGuard and 2FA.
networking : true
builddeps  :
    - golang
environment: |
    export VERSION_LONG=%version%
    export VERSION_SHORT=%version%
setup      : |
    %patch -p1 -i $pkgfiles/defaults.patch
build      : |
    ./build_dist.sh tailscale.com/cmd/tailscale
    ./build_dist.sh tailscale.com/cmd/tailscaled
install    : |
    %install_license LICENSE
    install -Dm00755 $workdir/tailscale $installdir/usr/bin/tailscale
    install -Dm00755 $workdir/tailscaled $installdir/usr/sbin/tailscaled
    install -Dm00644 $workdir/cmd/tailscaled/tailscaled.service $installdir/usr/lib64/systemd/system/tailscaled.service
    install -Dm00644 $workdir/cmd/tailscaled/tailscaled.defaults $installdir/usr/share/defaults/tailscale/tailscaled

    # Install service preset file
    install -Dm00644 -t ${installdir}/%libdir%/systemd/system-preset/ ${pkgfiles}/20-tailscale.preset

    # Shell completions
    $workdir/tailscale completion bash | install -Dm00644 /dev/stdin $installdir/usr/share/bash-completion/completions/tailscale
    $workdir/tailscale completion zsh | install -Dm00644 /dev/stdin $installdir/usr/share/zsh/site-functions/_tailscale
    $workdir/tailscale completion fish | install -Dm00644 /dev/stdin $installdir/usr/share/fish/vendor_completions.d/tailscale.fish
