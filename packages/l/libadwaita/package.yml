# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : libadwaita
version    : 1.8.5.1
release    : 37
source     :
    - https://download.gnome.org/sources/libadwaita/1.8/libadwaita-1.8.5.1.tar.xz : 7a306296deda956207425b375355c212d254f27db6560733d08dca12fb5e52c3
homepage   : https://gnome.pages.gitlab.gnome.org/libadwaita/
license    : LGPL-2.1-or-later
component  : desktop.library
summary    : Building blocks for modern adaptive GNOME applications.
description: |
    Adwaita offers application developers many widgets and objects to build GNOME applications scaling from desktop workstations to mobile phones.
optimize   :
    - lto
builddeps  :
    - pkgconfig(appstream)
    - pkgconfig(gobject-introspection-1.0)
    - pkgconfig(gtk4)
    - sassc
    - vala
setup      : |
    %meson_configure -Dexamples=false
build      : |
    %ninja_build
install    : |
    %ninja_install
#check      : |
#    %ninja_check
