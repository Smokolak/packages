# yaml-language-server: $schema=/usr/share/ypkg/schema/schema.json
name       : python-nbconvert
version    : 7.17.0
release    : 21
source     :
    - https://files.pythonhosted.org/packages/source/n/nbconvert/nbconvert-7.17.0.tar.gz : 1b2696f1b5be12309f6c7d707c24af604b87dfaf6d950794c7b07acab96dda78
homepage   : https://github.com/jupyter/nbconvert
license    : BSD-3-Clause
component  : programming.python
summary    : Jupyter Notebook Conversion
description: |
    The nbconvert tool, jupyter nbconvert, converts notebooks to various other formats via Jinja templates. The nbconvert tool allows you to convert an .ipynb notebook file into various static formats.
networking : true
builddeps  :
    - python-build
    - python-hatchling
    - python-installer
rundeps    :
    - python-beautifulsoup4
    - python-bleach
    - python-defusedxml
    - python-jinja
    - python-jupyter_core
    - python-jupyterlab-pygments
    - python-mistune
    - python-nbclient
    - python-packaging
    - python-pandocfilters
setup      : |
    %python3_setup
install    : |
    %python3_install
